{% extends "base.html" %}
{% block content %}
    <div class="w-full bg-primary py-6 px-12 mb-12">
        <div class="m-auto flex text-center flex-col ">
            <h1 class="text-4xl font-bold text-white">All Treks</h1>
            <p class="text-white/80 text-base">Discover the best trekking destinations across Maharashtra's Sahyadri ranges.</p>
        </div>
    </div>

    <div class="mb-8 px-5 md:px-20 w-full">
        <div class="md:px-8 flex flex-col md:flex-row md:justify-end items-center gap-3">
            <span class="text-base font-medium">Difficulty:</span>
            <div class="bg-background gap-1 rounded-md p-1 flex">
                <a href="/treks"
                   class="difficulty-btn {% if not active_difficulty %}active{% endif %}">
                    All
                </a>
            
                <a href="/treks?difficulty=Easy"
                   class="difficulty-btn {% if active_difficulty == 'Easy' %}active{% endif %}">
                    Easy
                </a>
            
                <a href="/treks?difficulty=Moderate"
                   class="difficulty-btn {% if active_difficulty == 'Moderate' %}active{% endif %}">
                    Moderate
                </a>
            
                <a href="/treks?difficulty=Hard"
                   class="difficulty-btn {% if active_difficulty == 'Hard' %}active{% endif %}">
                    Hard
                </a>
            </div>
        </div>
    </div>

    <div class="card-container px-4 md:px-6 mb-12 flex flex-col md:flex-row gap-6 md:gap-10 flex-wrap items-center justify-center ">
    
        {% for trek in treks %}
 
            {% include "components/trek_card.html" %}

        {% endfor %}

    </div>

    <script>
        const buttons = document.querySelectorAll(".difficulty-btn");

        buttons.forEach(button => {
            button.addEventListener("click", function () {
            
                // Remove active from all
                buttons.forEach(btn => btn.classList.remove("active"));
            
                // Add active to clicked one
                this.classList.add("active");
            
            });
        });
    </script>


{% endblock %}
