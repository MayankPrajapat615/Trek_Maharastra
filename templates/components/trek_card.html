<div class="card w-full max-w-[350px] md:w-[320px] lg:w-[350px] min-h-[400px] rounded-2xl relative">
    <div class="upper-half">
        <img class="h-[180px] w-full object-cover block object-bottom
                    filter brightness-[0.85] contrast-[1.15] saturate-[1.05] transition-all duration-300 hover:brightness-[0.95] hover:scale-105" 
                src="{{ url_for('static', filename=trek.image) }}" alt="">
        {% if trek.is_new %}
        <span class="absolute top-2 left-2 py-1 px-2 text-background bg-secondary rounded-xl">New</span>
        {% endif %}
    </div>
    <div class="lower-half p-4 bg-background flex flex-col flex-1">
        <div class="card-header flex items-center justify-between mb-3 text-background">
            <h3 class="text-lg font-medium text-black">{{ trek.name }}</h3>
            <span class="bg-secondary py-1 px-2 rounded-lg font-medium">{{ trek.difficulty | capitalize }}</span>
        </div>
        <p class="line-clamp-3 mb-3">{{ trek.description | striptags }}</p>
        <div class="card-icons flex align-middle gap-4 text-xs font-medium">
            <span class="flex align-middle gap-1">
                <img class="h-4 w-4 align-middle" src="{{ url_for('static', filename='images/icons/anchor_18dp_000000_FILL0_wght500_GRAD200_opsz20.svg') }}" alt="">
                {{ trek.duration_hours }} hrs
            </span>
            <span class="flex align-middle gap-1">
                <img class="h-4 w-4 align-middle" src="{{ url_for('static', filename='images/icons/trending_up_18dp_000000_FILL0_wght500_GRAD200_opsz20.svg') }}" alt="">
                {{ trek.distance_km }} km
            </span>
            <span class="flex align-middle gap-1">
                <img class="h-4 w-4 align-middle" src="{{ url_for('static', filename='images/icons/group_18dp_000000_FILL0_wght500_GRAD200_opsz20.svg') }}" alt="">
                4-{{ trek.group_size }}
            </span>
        </div>
        <div class="view-all-btn mt-4 pt-3 text-center">
                <a href="/treks/{{ trek.slug }}">View Details</a>
        </div>
    </div>
</div>
